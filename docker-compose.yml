version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: sfsto-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sfsto
    ports:
      - "5432:5432"
    volumes:
      - sfsto-db-data:/var/lib/postgresql/data
  app:
    build: .
    container_name: sfsto-app
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sfsto
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
volumes:
  sfsto-db-data:
    driver: local
