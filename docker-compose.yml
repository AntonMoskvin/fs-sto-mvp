version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: sfsto-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sfsto
    ports:
      - "5432:5432"
    volumes:
      - sfsto-db-data:/var/lib/postgresql/data
volumes:
  sfsto-db-data:
    driver: local
