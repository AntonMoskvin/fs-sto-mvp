<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SFSTO MVP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 60vh; width: 100%; }
    body { margin: 0; font-family: Arial, sans-serif; }
    #content { padding: 8px; }
  </style>
</head>
  <body>
    <div id="map" style="height:60vh; width:100%;"></div>
    <div id="content" style="padding:8px;">SFSTO MVP — карта станций и бронирование</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // Inline simple frontend logic to avoid missing static assets
      (function(){
        var map = L.map('map').setView([55.7558, 37.6173], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        fetch('/api/v1/stations')
          .then(r => r.json())
          .then(stations => {
            stations.forEach(s => {
              if (typeof s.latitude === 'number' && typeof s.longitude === 'number') {
                L.marker([s.latitude, s.longitude]).addTo(map).bindPopup('<b>' + s.name + '</b><br/>' + (s.address||''));
              }
            });
          }).catch(err => console.error('Failed to load stations', err));
      })();
    </script>
  </body>
</html>
